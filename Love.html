<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Love Sh Zoom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: none; /* Предотвращаем стандартный скролл на мобильных */
        }
        canvas {
            display: block;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .flash {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 100px 50px #ea80b0;
            opacity: 0;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay"><div id="flash-point" class="flash"></div></div>
    <div id="instructions">Вращайте мышкой • Колесо для масштаба</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stars, heartGroup;
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let targetZoom = 400;
        let currentZoom = 1000; // Начинаем издалека для эффекта влета
        let clock = new THREE.Clock();

        window.onload = function() {
            init();
            triggerFlash();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.z = currentZoom;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Звезды
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 });
            const starVertices = [];
            for (let i = 0; i < 8000; i++) {
                starVertices.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Группа сердца
            heartGroup = new THREE.Group();
            scene.add(heartGroup);

            const count = 200;
            for (let i = 0; i < count; i++) {
                const sprite = createTextSprite("I love you Sh");
                const t = (i / count) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                
                sprite.userData.targetPos = new THREE.Vector3(x * 10, y * 10, (Math.random() - 0.5) * 50);
                sprite.position.set(0, 0, 0);
                sprite.scale.set(0.1, 0.1, 0.1);
                sprite.material.opacity = 0;
                sprite.userData.delay = Math.random() * 0.8;
                sprite.userData.speed = 0.03 + Math.random() * 0.03;
                
                heartGroup.add(sprite);
            }

            // Слушатели событий
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) / 250;
                mouseY = (e.clientY - window.innerHeight / 2) / 250;
            });

            // Масштабирование колесом мыши
            document.addEventListener('wheel', (e) => {
                targetZoom += e.deltaY * 0.5;
                targetZoom = Math.max(100, Math.min(1500, targetZoom)); // Ограничения
            }, { passive: true });

            // Масштабирование тачем (pinch zoom)
            let initialDist = 0;
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    mouseX = (e.touches[0].pageX - window.innerWidth / 2) / 150;
                    mouseY = (e.touches[0].pageY - window.innerHeight / 2) / 150;
                } else if (e.touches.length === 2) {
                    const dist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const diff = initialDist - dist;
                    targetZoom += diff * 2;
                    targetZoom = Math.max(100, Math.min(1500, targetZoom));
                    initialDist = dist;
                }
            }, { passive: false });

            window.addEventListener('resize', onWindowResize, false);
        }

        function triggerFlash() {
            const flash = document.getElementById('flash-point');
            flash.style.opacity = '1';
            setTimeout(() => {
                flash.style.transition = 'transform 1s ease-out, opacity 1.2s ease-out';
                flash.style.transform = 'scale(120)';
                flash.style.opacity = '0';
            }, 100);
        }

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 100;

            context.font = 'bold 40px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            context.shadowBlur = 12;
            context.shadowColor = '#ea80b0';
            context.fillStyle = '#ff69b4';
            context.fillText(text, 200, 50);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            return new THREE.Sprite(material);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            let time = clock.getElapsedTime();

            // Анимация взрыва
            heartGroup.children.forEach((child) => {
                if (time > child.userData.delay) {
                    child.position.lerp(child.userData.targetPos, child.userData.speed);
                    if (child.scale.x < 50) {
                        let ns = child.scale.x + 1.5;
                        child.scale.set(ns, ns / 4, 1);
                    }
                    if (child.material.opacity < 1) {
                        child.material.opacity += 0.04;
                    }
                }
            });

            // Плавный зум
            currentZoom += (targetZoom - currentZoom) * 0.08;
            camera.position.z = currentZoom;

            // Вращение
            targetRotationX += (mouseY - targetRotationX) * 0.05;
            targetRotationY += (mouseX - targetRotationY) * 0.05;
            
            heartGroup.rotation.x = targetRotationX + Math.sin(time * 0.3) * 0.05;
            heartGroup.rotation.y = targetRotationY + time * 0.15;

            stars.rotation.y += 0.0002;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
